name: Execute_PoC
on: [push]
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Force Execution
        working-directory: ./sdk/storage/azblob
        run: |
          # 1. تحديث النسخة في go.mod لتتوافق مع السيرفر
          sed -i 's/go 1.25.0/go 1.21/' go.mod
          
          # 2. تشغيل التست مباشرة من الملف الذي أنشأناه سابقاً
          # هذا الأمر سيتجاهل الأخطاء الجانبية ويركز على تشغيل دالة الـ Leak
          go test -v -run TestImpact_CredentialLeakage || true
