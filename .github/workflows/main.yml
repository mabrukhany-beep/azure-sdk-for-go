name: Execute_PoC
on: [push]
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Run Attack
        # الانتقال مباشرة لمجلد الموديول قبل التشغيل
        working-directory: ./sdk/storage/azblob
        run: go test -v -run TestImpact_CredentialLeakage
