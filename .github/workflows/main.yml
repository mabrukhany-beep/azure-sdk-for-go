name: Execute_PoC
on: [push] # سيعمل تلقائياً بمجرد ضغط Commit
jobs:
  run-exploit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Run Attack
        run: go test -v ./sdk/storage/azblob/ -run TestImpact_CredentialLeakage
